<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Thể loại - LuminaBook</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>
<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl py-5">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 fw-bold mb-1">Thể loại sách</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb small mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
                        <li class="breadcrumb-item active">Thể loại</li>
                    </ol>
                </nav>
            </div>
            <a th:href="@{/categories/new}" class="btn btn-primary btn-sm"
               sec:authorize="hasRole('ADMIN')">
                <i class="fa fa-plus me-1"></i> Thêm thể loại
            </a>
        </div>

        <!-- Success Alert -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fa fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Empty State -->
        <div th:if="${categories.isEmpty()}" class="text-center py-5 text-muted">
            <i class="fa fa-book fa-2x mb-3 d-block opacity-25"></i>
            <p class="mb-0">Chưa có thể loại nào.</p>
        </div>

        <!-- Genre Grid -->
        <div class="row g-3" th:unless="${categories.isEmpty()}">
            <div class="col-sm-6 col-lg-4" th:each="cat : ${categories}">
                <div class="card h-100 border">

                    <div class="card-body">
                        <!-- Parent badge -->
                        <span th:if="${cat.parent != null}"
                              class="badge text-bg-light border fw-normal small mb-2 d-inline-block">
                            <i class="fa fa-level-up-alt fa-rotate-90 me-1"></i>
                            <span th:text="${cat.parent.name}"></span>
                        </span>

                        <!-- Name & slug -->
                        <h5 class="card-title mb-0 fw-semibold" th:text="${cat.name}">Tiểu thuyết</h5>
                        <code class="small text-muted" th:text="${cat.slug}">tieu-thuyet</code>

                        <!-- Description -->
                        <p class="card-text text-muted small mt-2 mb-0"
                           th:text="${cat.description}"
                           style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"></p>
                    </div>

                    <!-- Admin footer -->
                    <div class="card-footer bg-transparent d-flex justify-content-between align-items-center py-2"
                         sec:authorize="hasRole('ADMIN')">
                        <small class="text-muted"
                               th:text="${#temporals.format(cat.updatedAt, 'dd/MM/yyyy')}"></small>
                        <div class="btn-group btn-group-sm">
                            <a th:href="@{/categories/edit/{id}(id=${cat.id})}"
                               class="btn btn-outline-secondary">
                                <i class="fa fa-pencil"></i>
                            </a>
                            <form th:action="@{/categories/delete/{id}(id=${cat.id})}" method="post"
                                  th:onsubmit="return confirm('Xóa thể loại [[${cat.name}]]?');">
                                <button type="submit" class="btn btn-outline-danger">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
