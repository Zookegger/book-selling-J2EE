<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Thể loại - LuminaBook Admin</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
    <style>
        .table-v-middle td { vertical-align: middle; }
        .badge-order { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: #f8f9fa; font-weight: bold; color: #6c757d; border: 1px solid #dee2e6; }
    </style>
</head>
<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 fw-bold mb-1">Quản lý Thể loại</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb small mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
                        <li class="breadcrumb-item active">Thể loại</li>
                    </ol>
                </nav>
            </div>
            <a th:href="@{/admin/categories/new}" class="btn btn-primary shadow-sm">
                <i class="fa fa-plus me-1"></i> Thêm thể loại mới
            </a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-4" role="alert">
            <i class="fa fa-check-circle me-2"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0 table-v-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4" style="width: 80px;">STT</th>
                            <th>Tên Thể Loại</th>
                            <th>Thông tin bổ sung</th>
                            <th>Ngày cập nhật</th>
                            <th class="text-end pe-4">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td class="ps-4">
                                <div class="badge-order" th:text="${cat.orderIndex}">0</div>
                            </td>
                            <td>
                                <div class="fw-bold text-dark fs-6" th:text="${cat.name}">Văn học</div>
                                <code class="small text-muted" th:text="${cat.slug}">van-hoc</code>
                            </td>
                            <td>
                                <div th:if="${cat.parent != null}">
                                    <span class="badge bg-light text-secondary border">
                                        <i class="fa fa-level-up-alt fa-rotate-90 me-1"></i>
                                        Cha: <span th:text="${cat.parent.name}"></span>
                                    </a>
                                </div>
                                <div class="text-truncate small text-muted mt-1" style="max-width: 250px;" th:text="${cat.description}"></div>
                            </td>
                            <td>
                                <small class="text-muted" th:text="${#temporals.format(cat.updatedAt, 'dd/MM/yyyy HH:mm')}"></small>
                            </td>
                            <td class="text-end pe-4">
                                <div class="btn-group">
                                    <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Chỉnh sửa">
                                        <i class="fa fa-edit"></i> Sửa
                                    </a>
                                    
                                    <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}" method="post" class="d-inline"
                                          th:onsubmit="return confirm('Bạn có chắc chắn muốn xóa thể loại [[${cat.name}]]? Điều này có thể ảnh hưởng đến các sách thuộc thể loại này.');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${categories.isEmpty()}">
                            <td colspan="5" class="text-center py-5 text-muted">Chưa có dữ liệu thể loại nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
