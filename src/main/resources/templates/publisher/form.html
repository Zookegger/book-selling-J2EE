<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' - LuminaBook'"></title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>
<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-md py-5" style="max-width: 900px;">
        <div class="mb-4">
            <a th:href="@{/publishers}" class="btn btn-sm btn-link text-decoration-none text-secondary p-0">
                <i class="fa fa-arrow-left me-1"></i> Quay lại danh sách nhà xuất bản
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-header bg-white border-0 pt-4 px-4 px-md-5">
                <h2 class="fw-bold text-dark mb-0">
                    <i th:class="${publisher.id != null} ? 'fa fa-edit text-primary me-2' : 'fa fa-plus-circle text-success me-2'"></i>
                    <span th:text="${pageTitle}">Tiêu đề trang</span>
                </h2>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form th:action="@{/publishers/save}" th:object="${publisher}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}" />
                    
                    <input type="hidden" th:field="*{logo}" />

                    <div class="mb-4">
                        <label class="form-label fw-bold text-uppercase small text-muted">Tên nhà xuất bản <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{name}" class="form-control form-control-lg border-0 bg-light" 
                               placeholder="VD: NXB Trẻ, NXB Giáo Dục..." required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-uppercase small text-muted">Email liên hệ <span class="text-danger">*</span></label>
                            <input type="email" th:field="*{contactEmail}" class="form-control border-0 bg-light" 
                                   placeholder="contact@company.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-uppercase small text-muted">Website</label>
                            <input type="url" th:field="*{website}" class="form-control border-0 bg-light" 
                                   placeholder="https://www.example.com">
                        </div>
                    </div>

                    <div class="mb-4 p-3 border rounded-3 bg-light">
                        <label class="form-label fw-bold text-uppercase small text-muted mb-3">Tải lên Ảnh Logo</label>
                        <div class="d-flex align-items-center gap-4">
                            <div class="bg-white border rounded p-2 text-center" style="width: 120px; height: 120px;">
                                <img id="thumbnail" alt="Logo Preview" class="img-fluid" style="max-height: 100%;"
                                     th:src="*{logo != null and !logo.isEmpty() ? logo : '/images/default-publisher.png'}">
                            </div>
                            <div class="flex-grow-1">
                                <input type="file" name="logoFile" id="fileImage" accept="image/png, image/jpeg, image/jpg, image/webp"
                                       class="form-control border-0 bg-white shadow-sm mb-2">
                                <small class="text-muted">Hỗ trợ file định dạng: JPG, PNG, WEBP. Kích thước tối đa 5MB.</small>
                            </div>
                        </div>
                    </div>

                    <div class="p-3 mb-4 rounded-3 border bg-light bg-opacity-50">
                        <h6 class="fw-bold mb-3 text-secondary"><i class="fa fa-map-marker-alt me-2"></i>Địa chỉ trụ sở</h6>
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label small text-muted">Địa chỉ chi tiết</label>
                                <input type="text" th:field="*{location.address}" class="form-control border-0 bg-white" placeholder="Số nhà, tên đường...">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Thành phố</label>
                                <input type="text" th:field="*{location.city}" class="form-control border-0 bg-white" placeholder="TP. Hồ Chí Minh">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Quốc gia</label>
                                <input type="text" th:field="*{location.country}" class="form-control border-0 bg-white" placeholder="Việt Nam">
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4 align-items-center">
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" th:field="*{active}" id="isActiveSwitch">
                                <label class="form-check-label fw-bold text-uppercase small text-muted" for="isActiveSwitch">Đang hoạt động</label>
                            </div>
                        </div>
                        <div class="col-md-6" th:if="*{id != null}">
                            <label class="form-label fw-bold text-uppercase small text-muted">Đường dẫn (Slug)</label>
                            <input type="text" th:field="*{slug}" class="form-control border-0 bg-light text-muted" readonly>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-uppercase small text-muted">Mô tả giới thiệu</label>
                        <textarea th:field="*{description}" class="form-control border-0 bg-light" rows="4" 
                                  placeholder="Giới thiệu ngắn gọn về nhà xuất bản..."></textarea>
                    </div>

                    <hr class="my-4">

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-5 py-2 fw-bold shadow-sm">
                            <i class="fa fa-save me-2"></i> Lưu nhà xuất bản
                        </button>
                        <a th:href="@{/publishers}" class="btn btn-light px-4 py-2">Hủy bỏ</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>

    <script>
        document.getElementById('fileImage').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('thumbnail').setAttribute('src', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
