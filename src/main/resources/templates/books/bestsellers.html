<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sách phổ biến | LuminaBook</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl flex-grow-1 py-5">
        <div class="d-flex flex-column flex-sm-row justify-content-between mb-4 gap-3">
            <div>
                <h1 class="h3">Sách phổ biến theo thể loại</h1>
                <p class="text-muted">Xem nhanh những đầu sách hàng đầu trong mỗi thể loại.</p>
            </div>
            <div>
                <a href="/books/new" class="btn btn-primary">Thêm sách mới</a>
            </div>
        </div>

        <div th:if="${popularByCategory.isEmpty()}">
            <div class="alert alert-info">Chưa có dữ liệu sách phổ biến.</div>
        </div>

        <div th:if="${!popularByCategory.isEmpty()}">
            <div th:each="entry : ${popularByCategory.entrySet()}">
                <div class="mb-4">
                    <h2 class="h4" th:text="${entry.key.name}"></h2>
                    <p class="text-muted">Top <span th:text="${entry.value.size()}"></span> cuốn mới nhất</p>
                </div>

                <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4 mb-5">
                    <div class="col" th:each="book : ${entry.value}">
                        <div class="card h-100 shadow-sm border-0">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title" th:text="${book.title}"></h5>
                                <p class="text-muted mb-2" th:text="${book.subtitle}"></p>
                                <div class="mb-2">
                                    <span class="badge bg-secondary me-1 mb-1" th:each="cat : ${book.categories}" th:text="${cat.name}"></span>
                                </div>
                                <p class="text-truncate" th:text="${book.description}"></p>
                                <div class="mt-auto d-flex gap-2">
                                    <a th:href="@{/books/{slug}(slug=${book.slug})}" class="btn btn-outline-primary flex-fill">Chi tiết</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
