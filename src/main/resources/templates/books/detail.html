<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${book.title} + ' - LuminaBook'">Thông tin sách</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl flex-grow-1 py-5">
        <div class="mb-4">
            <a class="btn btn-outline-secondary" th:href="@{/books}"><i class="fa fa-arrow-left me-1"></i> Quay về</a>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body text-center">
                        <div class="mb-4">
                            <div th:if="${book.coverImage != null and !book.coverImage.isBlank()}" class="overflow-hidden rounded-4 shadow-sm">
                                <img th:src="${book.coverImage}" class="img-fluid rounded-4" alt="Ảnh bìa sách" />
                            </div>
                            <div th:if="${book.coverImage == null or book.coverImage.isBlank()}"
                                class="bg-light rounded-4 py-5 d-flex align-items-center justify-content-center">
                                <span class="text-muted">Không có ảnh bìa</span>
                            </div>
                        </div>

                        <div class="text-start">
                            <p class="text-uppercase text-muted small mb-2">Tác giả</p>
                            <p class="h6 fw-semibold mb-3" th:text="${book.authors.size() > 0 ? book.authors.get(0).name : 'Không xác định'}"></p>

                            <div class="mb-3">
                                <span class="badge bg-secondary me-1 mb-1" th:each="category : ${book.categories}"
                                    th:text="${category.name}"></span>
                            </div>

                            <div class="rounded-4 bg-light p-3">
                                <p class="text-uppercase text-muted small mb-2">Nhà xuất bản</p>
                                <p class="mb-0 fw-semibold"
                                    th:text="${book.publisher != null ? book.publisher.name : 'Không có'}"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start gap-3 mb-4">
                            <div>
                                <h1 class="h3 mb-1" th:text="${book.title}"></h1>
                                <p class="text-muted mb-0" th:text="${book.subtitle}"></p>
                            </div>
                            <div class="text-sm-end">
                                <span class="badge bg-primary text-uppercase" th:text="${book.language}"></span>
                            </div>
                        </div>

                        <div class="rounded-4 bg-light p-4 mb-4">
                            <h2 class="h6 text-uppercase text-muted mb-3">Giới thiệu</h2>
                            <p class="mb-0" th:text="${book.description}"></p>
                        </div>

                        <div class="row row-cols-1 row-cols-md-2 g-3 mb-4">
                            <div class="col">
                                <div class="p-3 border rounded-4 h-100">
                                    <p class="text-uppercase text-muted small mb-2">ISBN</p>
                                    <p class="mb-0 fw-semibold" th:text="${book.isbn}"></p>
                                </div>
                            </div>
                            <div class="col">
                                <div class="p-3 border rounded-4 h-100">
                                    <p class="text-uppercase text-muted small mb-2">Ngày xuất bản</p>
                                    <p class="mb-0 fw-semibold" th:text="${book.publicationDate}"></p>
                                </div>
                            </div>
                            <div class="col">
                                <div class="p-3 border rounded-4 h-100">
                                    <p class="text-uppercase text-muted small mb-2">Số trang</p>
                                    <p class="mb-0 fw-semibold" th:text="${book.pageCount}"></p>
                                </div>
                            </div>
                            <div class="col">
                                <div class="p-3 border rounded-4 h-100">
                                    <p class="text-uppercase text-muted small mb-2">Danh mục</p>
                                    <p class="mb-0" th:each="category, iterStat : ${book.categories}">
                                        <span th:text="${category.name}"></span><span th:if="${!iterStat.last}">, </span>
                                    </p>
                                </div>
                            </div>
                        </div>

                        <dl class="row gy-3">
                            <dt class="col-sm-4 text-muted">Tác giả</dt>
                            <dd class="col-sm-8">
                                <span th:if="${#lists.isEmpty(book.authors)}">Không xác định</span>
                                <span th:each="author, iterStat : ${book.authors}">
                                    <span th:text="${author.name}"></span><span th:if="${!iterStat.last}">, </span>
                                </span>
                            </dd>

                            <dt class="col-sm-4 text-muted">Nhà xuất bản</dt>
                            <dd class="col-sm-8" th:text="${book.publisher != null ? book.publisher.name : 'Không có'}"></dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
