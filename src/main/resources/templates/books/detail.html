<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${book.title} + ' - LuminaBook'">Thông tin sách</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
    <style>
        .book-badge {
            letter-spacing: 0.04em;
        }

        .book-card {
            border-radius: 1.5rem;
            overflow: hidden;
        }

        .book-cover-placeholder {
            min-height: 340px;
        }

        .book-info-box {
            border-radius: 1.25rem;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl flex-grow-1 py-5">
        <div class="mb-4">
            <a class="btn btn-outline-secondary btn-sm shadow-sm" th:href="@{/books}">
                <i class="fa fa-arrow-left me-1"></i> Quay lại danh sách sách
            </a>
        </div>

        <section class="bg-white rounded-4 shadow-sm p-4 p-md-5 book-card">
            <div class="row g-4 align-items-start">
                <div class="col-lg-4">
                    <div class="position-relative overflow-hidden rounded-4 shadow-lg">
                        <div th:if="${book.coverImage != null and !book.coverImage.isBlank()}" class="w-100 h-100">
                            <img th:src="${book.coverImage}" class="img-fluid w-100" alt="Ảnh bìa sách" />
                        </div>
                        <div th:if="${book.coverImage == null or book.coverImage.isBlank()}"
                            class="book-cover-placeholder d-flex align-items-center justify-content-center bg-light">
                            <div class="text-center px-3">
                                <i class="fa fa-book-open fs-1 text-secondary mb-3"></i>
                                <p class="mb-0 text-secondary">Chưa có ảnh bìa</p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 text-center text-sm-start">
                        <p class="text-uppercase text-muted small mb-2">Thể loại</p>
                        <div class="d-flex flex-wrap gap-2 justify-content-center justify-content-sm-start">
                            <span class="badge bg-primary book-badge" th:each="category : ${book.categories}"
                                th:text="${category.name}"></span>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="d-flex flex-column h-100">
                        <div class="mb-4">
                            <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start gap-3">
                                <div>
                                    <h1 class="display-6 fw-bold mb-2" th:text="${book.title}"></h1>
                                    <p class="text-muted fs-5 mb-0" th:text="${book.subtitle}"></p>
                                </div>
                                <div class="text-sm-end">
                                    <span class="badge bg-info text-dark text-uppercase book-badge"
                                        th:text="${book.language}"></span>
                                </div>
                            </div>

                            <div class="mt-3 text-muted">
                                <span class="me-3"><strong>ISBN:</strong> <span th:text="${book.isbn}"></span></span>
                                <span><strong>Trang:</strong> <span th:text="${book.pageCount}"></span></span>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="p-4 book-info-box bg-light h-100">
                                    <p class="text-uppercase text-muted small mb-2">Tác giả</p>
                                    <p class="fw-semibold mb-0">
                                        <span th:if="${#lists.isEmpty(book.authors)}">Không xác định</span>
                                        <span th:each="author, iterStat : ${book.authors}">
                                            <span th:text="${author.name}"></span><span th:if="${!iterStat.last}">, </span>
                                        </span>
                                    </p>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="p-4 book-info-box bg-light h-100">
                                    <p class="text-uppercase text-muted small mb-2">Nhà xuất bản</p>
                                    <p class="fw-semibold mb-0"
                                        th:text="${book.publisher != null ? book.publisher.name : 'Không có'}"></p>
                                </div>
                            </div>
                        </div>

                        <div class="rounded-4 bg-white p-4 border book-info-box mb-4">
                            <h2 class="h5 fw-semibold mb-3">Giới thiệu về quyển sách</h2>
                            <p class="text-muted mb-0" th:text="${book.description}"></p>
                        </div>

                        <div class="row row-cols-1 row-cols-md-2 g-3">
                            <div class="col">
                                <div class="p-4 book-info-box h-100">
                                    <p class="text-uppercase text-muted small mb-2">Ngày xuất bản</p>
                                    <p class="fw-semibold mb-0" th:text="${book.publicationDate}"></p>
                                </div>
                            </div>
                            <div class="col">
                                <div class="p-4 book-info-box h-100">
                                    <p class="text-uppercase text-muted small mb-2">Danh mục</p>
                                    <p class="mb-0" th:each="category, iterStat : ${book.categories}">
                                        <span th:text="${category.name}"></span><span th:if="${!iterStat.last}">, </span>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
