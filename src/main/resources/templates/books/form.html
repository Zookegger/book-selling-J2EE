<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${pageTitle} + ' - LuminaBook'">Quản lý sách</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl flex-grow-1 py-5">
        <div class="mb-4">
            <a class="btn btn-outline-secondary" th:href="@{/books}"><i class="fa fa-arrow-left me-1"></i> Quay về danh sách</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h4 mb-4" th:text="${pageTitle}"></h1>

                <form th:action="${book != null} ? @{/books/{slug}/edit(slug=${book.slug})} : @{/books/new}"
                    th:object="${bookRequest}" method="post">
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                    <div class="mb-3">
                        <label for="title" class="form-label">Tiêu đề</label>
                        <input type="text" th:field="*{title}" id="title" class="form-control" placeholder="Nhập tiêu đề sách" required />
                        <div class="text-danger" th:errors="*{title}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="subtitle" class="form-label">Phụ đề</label>
                        <input type="text" th:field="*{subtitle}" id="subtitle" class="form-control" placeholder="Nhập phụ đề" />
                        <div class="text-danger" th:errors="*{subtitle}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Mô tả</label>
                        <textarea th:field="*{description}" id="description" class="form-control" rows="5" placeholder="Mô tả sách" required></textarea>
                        <div class="text-danger" th:errors="*{description}"></div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label for="isbn" class="form-label">ISBN</label>
                            <input type="text" th:field="*{isbn}" id="isbn" class="form-control" placeholder="ISBN" />
                            <div class="text-danger" th:errors="*{isbn}"></div>
                        </div>
                        <div class="col-md-4">
                            <label for="publicationDate" class="form-label">Ngày xuất bản</label>
                            <input type="date" th:field="*{publicationDate}" id="publicationDate" class="form-control" required />
                            <div class="text-danger" th:errors="*{publicationDate}"></div>
                        </div>
                        <div class="col-md-4">
                            <label for="language" class="form-label">Ngôn ngữ</label>
                            <input type="text" th:field="*{language}" id="language" class="form-control" placeholder="en" />
                            <div class="text-danger" th:errors="*{language}"></div>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label for="pageCount" class="form-label">Số trang</label>
                            <input type="number" th:field="*{pageCount}" id="pageCount" class="form-control" min="1" />
                            <div class="text-danger" th:errors="*{pageCount}"></div>
                        </div>
                        <div class="col-md-8">
                            <label for="coverImage" class="form-label">Ảnh bìa (URL)</label>
                            <input type="text" th:field="*{coverImage}" id="coverImage" class="form-control" placeholder="https://..." />
                            <div class="text-danger" th:errors="*{coverImage}"></div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="publisherId" class="form-label">Nhà xuất bản</label>
                        <select th:field="*{publisherId}" id="publisherId" class="form-select">
                            <option th:value="" disabled selected>Chọn nhà xuất bản</option>
                            <option th:each="publisher : ${publishers}"
                                th:value="${publisher.id}"
                                th:text="${publisher.name}"></option>
                        </select>
                        <div class="text-danger" th:errors="*{publisherId}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="authorIds" class="form-label">Tác giả</label>
                        <select th:field="*{authorIds}" id="authorIds" class="form-select" multiple size="4">
                            <option th:each="author : ${authors}"
                                th:value="${author.id}"
                                th:text="${author.name}"></option>
                        </select>
                        <div class="text-danger" th:errors="*{authorIds}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="categoryIds" class="form-label">Danh mục</label>
                        <select th:field="*{categoryIds}" id="categoryIds" class="form-select" multiple size="4">
                            <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"></option>
                        </select>
                        <div class="text-danger" th:errors="*{categoryIds}"></div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Lưu</button>
                        <a class="btn btn-outline-secondary" th:href="@{/books}">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
