<!-- 
    Template để hiển thị modal chọn định dạng sách khi người dùng muốn thêm sách vào giỏ hàng.
    Được sử dụng trong trang chi tiết sách (detail.html) và có thể tái sử dụng ở những nơi khác nếu cần. 

    Sử dụng như sau:
        <th:block th:replace="~{books/components/formatSelection :: formatSelection(book=${book}, formats=${book.formats}, modalId='formatSelectionModal')}"></th:block>

    Giải thích:
    - book: đối tượng sách hiện tại, dùng để hiển thị tên sách và truyền bookId khi thêm vào giỏ.
    - formats: danh sách các định dạng có sẵn của sách, dùng để hiển thị các lựa chọn định dạng trong modal.
    - modalId: ID duy nhất cho modal này, giúp tránh xung đột nếu có nhiều modal trên cùng một trang.
-->
<th:block th:fragment="formatSelection(book, formats, modalId)" xmlns:th="http://www.thymeleaf.org">
    <div class="modal fade" th:attr="id=${modalId},data-format-selection=true" tabindex="-1"
        th:attrappend="aria-labelledby=${modalId + 'Label'}" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">

                <div class="modal-header border-0 pb-0 pt-4 px-4">
                    <div>
                        <span
                            class="badge bg-primary bg-opacity-10 text-primary mb-2 px-3 py-2 rounded-pill fw-semibold text-uppercase tracking-wide">
                            <i class="fa fa-layer-group me-1"></i> Chọn phiên bản
                        </span>
                        <h4 class="modal-title fw-bold text-dark" th:attr="id=${modalId + 'Label'}"
                            th:text="${book.title}">Tên Sách</h4>
                    </div>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body px-4 pb-4 pt-3">
                    <form th:action="@{/cart/add}" method="post" data-format-selection-form="true">
                        <input type="hidden" name="bookId" th:value="${book.id}" />
                        <input type="hidden" name="sku" />

                        <div class="row g-3 mt-1">
                            <div class="col-12" th:if="${#lists.isEmpty(formats)}">
                                <div class="alert alert-warning border-0 rounded-3 d-flex align-items-center mb-0">
                                    <i class="fa fa-exclamation-triangle fs-4 me-3 text-warning"></i>
                                    <div>
                                        <h6 class="mb-0 fw-bold">Hết hàng</h6>
                                        <p class="mb-0 small">Sách này chưa có phiên bản nào để chọn.</p>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-4" th:each="f, stat : ${formats}">
                                <!-- Lưu thông tin định dạng đã chọn trong input -->
                                <input class="btn-check" type="radio" name="formatChoice"
                                    th:id="${modalId + '_formatChoice_' + stat.index}"
                                    th:attr="data-sku=${f.sku},data-format-name=${f.formatType?.name()},data-stock=${f.stockQuantity != null ? f.stockQuantity : ''}"
                                    th:checked="${stat.first}" />

                                <label
                                    class="card h-100 border-2 rounded-4 format-card position-relative overflow-hidden"
                                    th:for="${modalId + '_formatChoice_' + stat.index}">

                                    <div class="active-indicator position-absolute top-0 start-0 w-100 bg-primary"
                                        style="height: 4px; opacity: 0; transition: opacity 0.2s;"></div>

                                    <div class="card-body d-flex flex-column pt-4">
                                        <div class="d-flex justify-content-between align-items-start gap-2 mb-3">
                                            <div class="text-uppercase small fw-bold text-secondary d-flex align-items-center gap-2"
                                                th:switch="${f.formatType?.name()}">
                                                <th:block th:case="'PHYSICAL'"><i
                                                        class="fa fa-book text-primary fs-5"></i> <span>Bản in</span>
                                                </th:block>
                                                <th:block th:case="'DIGITAL'"><i
                                                        class="fa fa-tablet-screen-button text-info fs-5"></i>
                                                    <span>eBook</span>
                                                </th:block>
                                                <th:block th:case="'AUDIOBOOK'"><i
                                                        class="fa fa-headphones text-warning fs-5"></i>
                                                    <span>Audiobook</span>
                                                </th:block>
                                                <th:block th:case="*"><i class="fa fa-box text-secondary fs-5"></i>
                                                    <span>Khác</span>
                                                </th:block>
                                            </div>
                                            <span class="badge rounded-pill fw-medium"
                                                th:classappend="${f.active} ? 'bg-success bg-opacity-10 text-success' : 'bg-secondary bg-opacity-10 text-secondary'"
                                                th:text="${f.active} ? 'Có sẵn' : 'Tạm ngưng'">Có sẵn</span>
                                        </div>

                                        <div class="mt-auto">
                                            <div
                                                class="text-muted small mb-1 d-flex justify-content-between align-items-center">

                                                <span th:if="${f.formatType?.name() == 'PHYSICAL'}">
                                                    Kho: <strong
                                                        th:text="${f.stockQuantity != null ? f.stockQuantity : 0}">0</strong>
                                                </span>
                                            </div>
                                            <div class="fs-4 fw-black text-dark"
                                                th:insert="~{books/components/price :: price(price=${f.discountedPrice != null ? f.discountedPrice : f.price}, quantity=1, currency=${f.currency})}">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="checked-icon position-absolute bottom-0 end-0 m-3 text-primary"
                                        style="opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                                        <i class="fa fa-circle-check fs-4"></i>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="row g-3 mt-4 align-items-center p-3 bg-light rounded-4 border">
                            <div class="col-md-6 d-flex align-items-center gap-3">
                                <label th:attr="for=${modalId + '_selectedFormatQty'}" class="form-label fw-bold mb-0 text-nowrap">Số
                                    lượng:</label>
                                <div>
                                    <input th:attr="id=${modalId + '_selectedFormatQty'}" type="number" name="qty"
                                        min="1" value="1"
                                        class="form-control form-control-lg text-center fw-bold border-2 shadow-none hide-arrows"
                                        style="max-width: 100px;" />
                                </div>
                                <span class="text-muted small lh-sm d-none d-lg-block" style="font-size: 0.75rem;">
                                    eBook/Audiobook<br>luôn mặc định 1
                                </span>
                            </div>

                            <div class="col-md-6 d-flex justify-content-md-end gap-2">
                                <button type="button" class="btn btn-light border-2 fw-bold px-4"
                                    data-bs-dismiss="modal">Hủy</button>
                                <button type="submit"
                                    class="btn btn-primary btn-lg fw-bold px-4 shadow-sm d-flex align-items-center gap-2">
                                    <i class="fa fa-cart-plus"></i> Thêm vào giỏ
                                </button>
                            </div>
                        </div>

                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                            th:value="${_csrf.token}" />
                    </form>
                </div>
            </div>
        </div>
    </div>

</th:block>
