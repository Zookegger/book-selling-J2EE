<!-- 
    Book grid fragment
    Sử dụng như sau:
    <th:block th:replace="~{books/components/bookGrid :: bookGrid(books=${books}, isAdmin=${isAdmin})}"></th:block>

    Giải thích:
    - bookGrid() là tên fragment, có thể chứa các tham số để truyền dữ liệu vào.
        + books: danh sách sách cần hiển thị (bắt buộc)
        + isAdmin: cờ xác định người dùng có phải là admin không (tùy chọn, mặc định false). Nếu là admin sẽ hiển thị thêm thông tin ISBN và nút sửa.
  -->
<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="bookGrid(books,isAdmin)">
    <div class="row row-cols-1 row-cols-md-3 row-cols-xl-4 g-4" th:if="${!books.isEmpty()}">
        <div class="col" th:each="book : ${books}">

            <a th:href="@{/books/{slug}(slug=${book.slug})}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-0">

                    <!-- Cover image -->
                    <div class="bg-light d-flex align-items-center justify-content-center"
                        style="height: 200px; overflow: hidden;">
                        <img th:if="${book.coverImage != null and !book.coverImage.isBlank()}"
                            th:src="${book.coverImage}" class="img-fluid h-100 w-100 object-fit-cover"
                            alt="Ảnh bìa sách" />
                        <span th:if="${book.coverImage == null or book.coverImage.isBlank()}"
                            class="text-muted small">Không có ảnh bìa</span>
                    </div>

                    <div class="card-body d-flex flex-column">

                        <!-- Title & subtitle -->
                        <h5 class="card-title mb-1" th:text="${book.title}"></h5>
                        <p class="text-muted small mb-2" th:text="${book.subtitle}"></p>

                        <!-- Admin only: ISBN -->
                        <p th:if="${isAdmin}" class="mb-2 small">
                            <strong>ISBN:</strong> <span th:text="${book.isbn}"></span>
                        </p>

                        <div class="mb-3 d-flex flex-wrap gap-1 align-items-center">
                            <!-- Format badges -->
                            <th:block th:each="f : ${book.formats}">
                                <span th:switch="${f.formatType.name()}">
                                    <span th:case="'PHYSICAL'" class="badge text-bg-success shadow-sm">Bản in</span>
                                    <span th:case="'DIGITAL'" class="badge text-bg-info shadow-sm">Ebook</span>
                                    <span th:case="'AUDIOBOOK'" class="badge text-bg-warning shadow-sm">Audiobook</span>
                                    <span th:case="*" class="badge text-bg-dark shadow-sm">Khác</span>
                                </span>
                            </th:block>

                            <!-- Category badges -->
                            <span th:if="${!#lists.isEmpty(book.categories)}" th:each="category : ${book.categories}"
                                class="badge rounded-pill border text-secondary fw-normal bg-transparent"
                                th:text="${category.name}">
                            </span>
                        </div>

                        <!-- Description -->
                        <p class="text-truncate text-muted small mb-3" th:text="${book.description}"></p>

                        <!-- Footer: price + actions -->
                        <div class="mt-auto">

                            <!-- Price (customer view) -->
                            <div class="d-flex align-items-center justify-content-between mb-3">
                                <span class="text-muted small">Giá bán</span>
                                <span class="fw-bold fs-5 text-primary">
                                    <span th:if="${!#lists.isEmpty(book.formats)}"
                                        th:insert="~{books/components/price :: price(price=${book.formats[0].discountedPrice != null ? book.formats[0].discountedPrice : book.formats[0].price}, quantity=1, currency='VND')}"></span>
                                    <span th:if="${#lists.isEmpty(book.formats)}">Chưa có giá</span>
                                </span>
                            </div>

                            <!-- Action buttons -->
                            <div class="d-flex gap-2">

                                <!-- Admin: edit -->
                                <a th:if="${isAdmin}" th:href="@{/books/{slug}/edit(slug=${book.slug})}"
                                    class="btn btn-sm btn-secondary flex-fill">Sửa</a>
                                <!-- Customer: buy -->
                                <button type="button" class="btn btn-sm btn-primary flex-fill">Mua</button>
                            </div>

                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</th:block>
