<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title
        th:text="${keyword != null and !keyword.isEmpty()} ? 'Kết quả tìm kiếm: ' + keyword + ' - LuminaBook' : 'Danh sách sách - LuminaBook'">
    </title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl flex-grow-1 py-5">

        <!-- ── Page header ─────────────────────────────────────────────── -->
        <div
            class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
            <div>
                <h1 class="h3 mb-1"
                    th:text="${keyword != null and !keyword.isEmpty()} ? 'Kết quả tìm kiếm' :  'Danh sách sách' ">
                </h1>
                <p class="text-muted mb-0"
                    th:text="${keyword != null and !keyword.isEmpty()}
                       ? 'Kết quả tìm kiếm cho: ' + keyword
                       : (${#authorization.expression('hasRole(''ADMIN'')')} ? 'Quản lý toàn bộ sách trong hệ thống.' : 'Khám phá toàn bộ sách trên cửa hàng.')">
                </p>
            </div>
            <!-- Admin only: add-book button -->
            <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" class="btn btn-primary" th:href="@{/books/new}">
                <i class="fa fa-plus me-1"></i> Thêm sách
            </a>
        </div>

        <div th:if="${books.isEmpty()}" class="alert alert-info">
            Không tìm thấy sách nào<span th:if="${keyword != null and !keyword.isEmpty()}"> cho từ khóa này</span>.
        </div>

        <!-- ── Book grid ───────────────────────────────────────────────── -->
        <th:block th:replace="~{books/components/bookGrid :: bookGrid(books=${books}, isAdmin=${#authorization.expression('hasRole(''ADMIN'')')})}"></th:block>

    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
