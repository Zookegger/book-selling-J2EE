<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${keyword != null and !keyword.isEmpty()} ? 'Kết quả tìm kiếm: ' + keyword : 'Tất cả sách'">Tìm kiếm sách</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl flex-grow-1 py-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
            <div>
                <h1 class="h3 mb-1" th:text="${keyword != null and !keyword.isEmpty()} ? 'Kết quả tìm kiếm' : 'Tất cả sách'"></h1>
                <p class="text-muted mb-0" th:text="${keyword != null and !keyword.isEmpty()} ? 'Tìm kiếm cho: ' + keyword : 'Khám phá toàn bộ sách trên cửa hàng.'"></p>
            </div>
        </div>

        <div th:if="${books.isEmpty()}">
            <div class="alert alert-info">Không tìm thấy sách nào cho từ khóa này.</div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" th:if="${!books.isEmpty()}">
            <div class="col" th:each="book : ${books}">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${book.title}"></h5>
                        <p class="text-muted mb-2" th:text="${book.subtitle}"></p>
                        <div class="mb-3">
                            <span class="badge bg-secondary me-1 mb-1" th:each="category : ${book.categories}" th:text="${category.name}"></span>
                        </div>
                        <p class="text-truncate mb-4" th:text="${book.description}"></p>

                        <div class="mt-auto">
                            <div class="d-flex align-items-center justify-content-between mb-3">
                                <div>
                                    <span class="text-muted small">Giới thiệu</span>
                                </div>
                                <div class="fw-bold fs-5 text-primary">
                                    <span th:if="${!#lists.isEmpty(book.formats)}" th:text="${book.formats[0].discountedPrice != null} ? (${book.formats[0].discountedPrice} + ' ' + ${book.formats[0].currency}) : (${book.formats[0].price} + ' ' + ${book.formats[0].currency})"></span>
                                    <span th:if="${#lists.isEmpty(book.formats)}">Liên hệ</span>
                                </div>
                            </div>
                            <div class="d-flex gap-2">
                                <a th:href="@{/books/{slug}(slug=${book.slug})}" class="btn btn-outline-primary flex-fill">Xem chi tiết</a>
                                <button type="button" class="btn btn-primary flex-fill">Mua</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
