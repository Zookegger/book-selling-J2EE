<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thể loại | LuminaBook</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl flex-grow-1 py-5">
        <div class="mb-4">
            <h1 class="h3">Thể loại sách</h1>
            <p class="text-muted">Chọn thể loại và bấm Lọc để xem sách tương ứng.</p>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/books}" method="get">
                    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-2">
                        <div class="col" th:each="c : ${categoryWithCount}">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="categoryIds" th:value="${c.id}"
                                    th:id="${'cat-' + c.id}" th:checked="${#lists.contains(selectedCategoryIds, c.id)}" />
                                <label class="form-check-label" th:for="${'cat-' + c.id}">
                                    <span th:text="${c.name}"></span>
                                    <small class="text-muted">(<span th:text="${c.count}"></span> sách)</small>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="mt-3 d-flex justify-content-end gap-2">
                        <button type="submit" class="btn btn-primary">Lọc</button>
                        <a class="btn btn-outline-secondary" th:href="@{/books}">Xóa bộ lọc</a>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
