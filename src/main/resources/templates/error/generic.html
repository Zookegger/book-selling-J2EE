<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${status != null ? status + ' - LuminaBook' : 'Lỗi - LuminaBook'}">Lỗi - LuminaBook</title>

    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <!-- Make this accept variable from Error controller -->
    <main class="container-xl flex-grow-1 py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h4 class="card-title mb-4 text-center fw-bold"
                            th:text="${status != null ? status + ' - ' + (errorMessage != null ? errorMessage : 'Đã xảy ra lỗi') : (errorMessage != null ? errorMessage : 'Đã xảy ra lỗi')}">
                            Lỗi
                        </h4>
                        <p class="card-text text-center" th:if="${path == null or path == ''}" th:text="${errorMessage}">Xin lỗi, đã xảy ra lỗi.</p>
                        <p class="card-text text-center" th:if="${path != null and path != ''}">
                            <span th:text="${errorMessage}">Xin lỗi, đã xảy ra lỗi.</span>
                            <br/>
                            <small class="text-muted">Trang: <span th:text="${path}">/example</span></small>
                        </p>
                        <a th:href="@{/}" class="btn btn-primary fw-semibold py-2">Quay lại trang chủ</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
