<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản lý sách - LuminaBook</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl flex-grow-1 py-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
            <div>
                <h1 class="h3 mb-1">Quản lý sách</h1>
                <p class="text-muted mb-0">Danh sách sách dành cho quản trị viên.</p>
            </div>
            <a class="btn btn-primary" th:href="@{/books/new}"><i class="fa fa-plus me-1"></i> Thêm sách</a>
        </div>

        <form class="row g-3 mb-4" th:action="@{/books}" method="get">
            <div class="col-md-8">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm sách theo tiêu đề, tác giả, ISBN hoặc nhà xuất bản" />
            </div>
            <div class="col-md-auto d-flex gap-2">
                <button class="btn btn-outline-primary">Tìm kiếm</button>
                <a class="btn btn-outline-secondary" th:href="@{/books}">Xóa</a>
            </div>
        </form>

        <div th:if="${books.isEmpty()}">
            <div class="alert alert-info">Không có sách nào.</div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" th:if="${!books.isEmpty()}">
            <div class="col" th:each="book : ${books}">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body d-flex flex-column">
                        <div class="mb-3">
                            <span class="badge bg-secondary me-1 mb-1" th:each="category : ${book.categories}" th:text="${category.name}"></span>
                        </div>
                        <h5 class="card-title" th:text="${book.title}"></h5>
                        <p class="text-muted mb-3" th:text="${book.subtitle}"></p>
                        <p class="text-truncate mb-4" th:text="${book.description}"></p>

                        <div class="mb-3">
                            <span class="text-muted">ISBN:</span>
                            <span th:text="${book.isbn}"></span>
                        </div>
                        <div class="mb-3">
                            <span class="text-muted">Giá bán:</span>
                            <span th:if="${!#lists.isEmpty(book.formats)}"
                                th:attr="data-price-value=${book.formats[0].discountedPrice != null ? book.formats[0].discountedPrice : book.formats[0].price}">
                                <span th:text="${book.formats[0].discountedPrice != null ? book.formats[0].discountedPrice : book.formats[0].price}"></span>
                            </span>
                            <span th:if="${#lists.isEmpty(book.formats)}">Chưa có giá</span>
                        </div>

                        <div class="mt-auto d-flex gap-2">
                            <a class="btn btn-outline-primary flex-fill" th:href="@{/books/{slug}(slug=${book.slug})}">Xem</a>
                            <a class="btn btn-primary flex-fill" th:href="@{/books/{slug}/edit(slug=${book.slug})}">Sửa</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
