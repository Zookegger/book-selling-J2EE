<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quên mật khẩu - LuminaBook</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl flex-grow-1 py-5">
        <div class="row justify-content-center">
            <div class="col-sm-6 col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-4 text-center">Yêu cầu đặt lại mật khẩu</h4>

                        <div th:if="${resetErrorMessage}" class="alert alert-danger" role="alert">
                            <span th:text="${resetErrorMessage}"></span>
                        </div>

                        <p class="text-muted mb-4">Nhập email bạn đã dùng đăng ký. Chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu.</p>

                        <form th:action="@{/forgot-password}" method="post">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="you@example.com" required />
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Gửi liên kết đặt lại</button>
                                <a class="btn btn-outline-secondary" th:href="@{/login}">Quay lại đăng nhập</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
