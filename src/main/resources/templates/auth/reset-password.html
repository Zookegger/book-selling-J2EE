<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đặt lại mật khẩu - LuminaBook</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl flex-grow-1 py-5">
        <div class="row justify-content-center">
            <div class="col-sm-6 col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-4 text-center">Đặt lại mật khẩu</h4>

                        <div th:if="${passwordError}" class="alert alert-danger" role="alert">
                            <span th:text="${passwordError}"></span>
                        </div>

                        <form th:action="@{/reset-password}" method="post">
                            <input type="hidden" name="token" th:value="${token}" />

                            <div class="mb-3">
                                <label for="password" class="form-label">Mật khẩu mới</label>
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Nhập mật khẩu mới" required minlength="8" />
                            </div>

                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                                <input type="password" class="form-control" id="confirmPassword"
                                    name="confirmPassword" placeholder="Nhập lại mật khẩu" required minlength="8" />
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Lưu mật khẩu mới</button>
                                <a class="btn btn-outline-secondary" th:href="@{/login}">Quay lại đăng nhập</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
