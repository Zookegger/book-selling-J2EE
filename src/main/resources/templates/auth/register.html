<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng ký - LuminaBook</title>

    <th:block th:replace="~{layout :: link-css}"></th:block>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl flex-grow-1 py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h4 class="card-title mb-4 text-center fw-bold">Tạo tài khoản mới</h4>

                        <div th:if="${emailError}" class="alert alert-danger" role="alert">
                            <span th:text="${emailError}"></span>
                        </div>
                        <form th:action="@{/register}" method="post" class="needs-validation" id="registerForm"
                            novalidate>

                            <div class="row mb-3">
                                <div class="col-6">
                                    <label class="form-label small fw-medium">Họ</label>
                                    <input type="text" name="firstName" class="form-control" placeholder="Họ" required>
                                    <div class="invalid-feedback">Vui lòng nhập họ.</div>
                                </div>

                                <div class="col-6">
                                    <label class="form-label small fw-medium">Tên</label>
                                    <input type="text" name="lastName" class="form-control" placeholder="Tên" required>
                                    <div class="invalid-feedback">Vui lòng nhập tên.</div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-medium">Email</label>
                                <input type="email" name="email" class="form-control" placeholder="example@mail.com"
                                    required />
                                <div class="invalid-feedback">Vui lòng nhập địa chỉ email hợp lệ.</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-medium">Mật khẩu</label>
                                <input type="password" name="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required
                                    minlength="8" />
                                <div class="invalid-feedback">Mật khẩu phải có ít nhất 8 ký tự.</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-medium">Xác nhận mật khẩu</label>
                                <input type="password" id="confirm_password" class="form-control" placeholder="Nhập lại mật khẩu" required />
                                <div class="invalid-feedback" id="confirm-error">Mật khẩu xác nhận không khớp.</div>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary fw-semibold py-2">Đăng ký</button>
                            </div>
                        </form>

                        <div class="mt-3 text-center">
                            <a th:href="@{/login}" class="text-decoration-none small">Đã có tài khoản? Đăng nhập</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            (() => {
                'use strict'
                const form = document.getElementById('registerForm')
                const password = document.getElementById('password')
                const confirm = document.getElementById('confirm_password')

                // Real-time password matching
                function validatePassword() {
                    if (password.value !== confirm.value) {
                        confirm.setCustomValidity("Passwords Don't Match");
                    } else {
                        confirm.setCustomValidity('');
                    }
                }

                password.onchange = validatePassword;
                confirm.onkeyup = validatePassword;

                // Bootstrap validation trigger
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })()
        </script>
    </main>

    <th:block th:replace="~{layout::footer}"></th:block>
</body>

</html>
