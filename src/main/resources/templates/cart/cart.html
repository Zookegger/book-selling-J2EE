<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<th:block th:replace="~{layout :: link-css}"></th:block>
	<title>Giỏ hàng — LuminaBook</title>
	<style>
		.cart-thumb { width: 64px; height: auto; object-fit: cover; }
		.quantity-input { width: 80px; }
	</style>
</head>
<body>
	<th:block th:replace="~{layout::header}"></th:block>

	<main class="container-xl flex-grow-1 my-4">
		<h1 class="mb-4">Giỏ hàng</h1>

		<div th:if="${items != null and !#lists.isEmpty(items)}">
			<div class="table-responsive">
				<table class="table align-middle">
					<thead>
						<tr>
							<th>Sản phẩm</th>
							<th class="text-end">Giá</th>
							<th style="width:140px">Số lượng</th>
							<th class="text-end">Thành tiền</th>
							<th></th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="item : ${items}">
							<td>
								<div class="d-flex align-items-center gap-3">
									<img th:src="${item.book.thumbnailUrl}" alt="" class="cart-thumb rounded">
									<div>
										<a th:href="@{/books/{id}(id=${item.book.id})}" th:text="${item.book.title}">Tên sách</a>
										<div class="text-muted small" th:text="${item.book.author}">Tác giả</div>
									</div>
								</div>
							</td>
							<td class="text-end" th:text="${item.price}">0</td>
							<td>
								<form th:action="@{/cart/update}" method="post" class="d-flex gap-2 align-items-center">
									<input type="hidden" name="bookId" th:value="${item.book.id}" />
									<input type="number" name="quantity" min="1" class="form-control form-control-sm quantity-input" th:value="${item.quantity}" />
									<button class="btn btn-sm btn-outline-secondary" type="submit">Cập nhật</button>
									<input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
								</form>
							</td>
							<td class="text-end" th:text="${item.price * item.quantity}">0</td>
							<td class="text-end">
								<form th:action="@{/cart/remove}" method="post">
									<input type="hidden" name="bookId" th:value="${item.book.id}" />
									<button class="btn btn-sm btn-danger" type="submit">Xóa</button>
									<input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
								</form>
							</td>
						</tr>
					</tbody>
				</table>
			</div>

			<div class="d-flex justify-content-between align-items-center mt-4">
				<div>
					<a th:href="@{/books}" class="btn btn-outline-primary">Tiếp tục mua sắm</a>
				</div>
				<div class="text-end">
					<div class="mb-2">Tổng: <span class="fs-4 fw-bold" th:text="${total}">0</span></div>
					<a class="btn btn-primary btn-lg" th:href="@{/checkout}">Thanh toán</a>
				</div>
			</div>
		</div>

		<div th:if="${items == null or #lists.isEmpty(items)}" class="text-center py-5">
			<p class="fs-4">Giỏ hàng của bạn đang trống</p>
			<a th:href="@{/books}" class="btn btn-outline-primary">Bắt đầu mua sắm</a>
		</div>
	</main>

	<th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
