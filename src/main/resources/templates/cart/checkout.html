<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{layout :: link-css}"></th:block>
    <title>Checkout — LuminaBook</title>
</head>

<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <main class="container-xl my-4 flex-grow-1">
        <h1 class="mb-4">Checkout</h1>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="row g-4" th:if="${cart != null and !cart.isEmpty()}">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="h5 mb-3">Thông tin nhận hàng</h2>

                        <form th:action="@{/checkout}" method="post" th:object="${checkoutForm}">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Phương thức thanh toán</label>
                                    <select class="form-select" th:field="*{paymentMethod}">
                                        <option th:each="method : ${paymentMethods}" th:value="${method.name()}"
                                            th:text="${method.name() == 'CREDIT_CARD' ? 'Thẻ tín dụng' : (method.name() == 'E_WALLET' ? 'Ví điện tử' : 'Chuyển khoản ngân hàng')}">
                                        </option>
                                    </select>
                                    <div class="form-text">Mô phỏng: mọi phương thức đều thanh toán thành công ngay.</div>
                                </div>
                                <div class="col-12">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <label class="form-label mb-0">Địa chỉ giao hàng</label>
                                        <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal"
                                            data-bs-target="#addAddressModal">
                                            <i class="bi bi-plus-circle"></i> Thêm địa chỉ
                                        </button>
                                    </div>

                                    <div th:if="${user.addresses == null or user.addresses.isEmpty()}" class="alert alert-warning mb-2">
                                        Bạn chưa có địa chỉ giao hàng. Vui lòng thêm địa chỉ để tiếp tục.
                                    </div>

                                    <div th:if="${user.addresses != null and !user.addresses.isEmpty()}" class="d-grid gap-2">
                                        <label class="border rounded p-3" th:each="address,iterStat : ${user.addresses}">
                                            <div class="form-check m-0">
                                                <input class="form-check-input" type="radio" th:field="*{selectedAddressIndex}"
                                                    th:value="${iterStat.index}" th:id="${'addr-' + iterStat.index}">
                                                <label class="form-check-label w-100" th:for="${'addr-' + iterStat.index}">
                                                    <div class="d-flex justify-content-between align-items-start">
                                                        <div>
                                                            <div class="fw-semibold" th:text="${address.recipientName}"></div>
                                                            <div class="small text-muted" th:text="${address.phoneNumber}"></div>
                                                            <p class="mb-0 small text-muted address-display" th:attr="data-street=${address.streetDetails},
                                                                    data-ward-code=${address.ward},
                                                                    data-district-code=${address.district},
                                                                    data-province-code=${address.provinceOrCity}"
                                                                th:text="${address.streetDetails + ', ' + address.ward + ', ' + address.district + ', ' + address.provinceOrCity}">
                                                            </p>
                                                        </div>
                                                        <span class="badge bg-success" th:if="${address.isDefault}">Mặc định</span>
                                                    </div>
                                                </label>
                                            </div>
                                        </label>
                                    </div>

                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('selectedAddressIndex')}"
                                        th:errors="*{selectedAddressIndex}"></div>
                                </div>
                            </div>

                            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                                th:value="${_csrf.token}" />

                            <div class="d-flex gap-2 mt-4">
                                <a th:href="@{/cart/view}" class="btn btn-outline-secondary">Quay lại giỏ hàng</a>
                                <button type="submit" class="btn btn-primary px-4">Xác nhận đặt hàng</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="h5 mb-3">Tóm tắt đơn hàng</h2>

                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Tạm tính</span>
                            <span
                                th:insert="~{books/components/price :: price(price=${subtotal}, quantity=1, currency='VND')}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">VAT</span>
                            <span
                                th:insert="~{books/components/price :: price(price=${tax}, quantity=1, currency='VND')}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Giảm giá</span>
                            <span
                                th:insert="~{books/components/price :: price(price=${discount}, quantity=1, currency='VND')}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-3" th:if="${couponCode != null and !couponCode.isBlank()}">
                            <span class="text-muted">Coupon</span>
                            <span class="fw-semibold" th:text="${couponCode}"></span>
                        </div>

                        <hr>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold">Tổng cộng</span>
                            <span class="fs-5 fw-bold"
                                th:insert="~{books/components/price :: price(price=${total}, quantity=1, currency='VND')}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="addAddressModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm địa chỉ mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/checkout/add-address}" method="post" id="addAddressForm" th:object="${addAddressForm}">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="newRecipientName" class="form-label">Tên người nhận</label>
                            <input type="text" class="form-control" id="newRecipientName" th:field="*{recipientName}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('recipientName')}" th:errors="*{recipientName}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="newPhoneNumber" class="form-label">Số điện thoại</label>
                            <input type="tel" class="form-control" id="newPhoneNumber" th:field="*{phoneNumber}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="newProvinceOrCity" class="form-label">Tỉnh/Thành phố</label>
                            <select class="form-select" id="newProvinceOrCity" th:field="*{provinceOrCity}" onchange="loadDistrictAdd()">
                                <option value="">-- Chọn tỉnh/thành phố --</option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('provinceOrCity')}" th:errors="*{provinceOrCity}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="newDistrict" class="form-label">Quận/Huyện</label>
                            <select class="form-select" id="newDistrict" th:field="*{district}" onchange="loadWardAdd()">
                                <option value="">-- Chọn quận/huyện --</option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('district')}" th:errors="*{district}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="newWard" class="form-label">Phường/Xã</label>
                            <select class="form-select" id="newWard" th:field="*{ward}">
                                <option value="">-- Chọn phường/xã --</option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('ward')}" th:errors="*{ward}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="newStreetDetails" class="form-label">Địa chỉ chi tiết</label>
                            <textarea class="form-control" id="newStreetDetails" th:field="*{streetDetails}" rows="2"></textarea>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('streetDetails')}" th:errors="*{streetDetails}"></div>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="newIsDefault" th:field="*{defaultAddress}">
                            <label class="form-check-label" for="newIsDefault">Đặt làm địa chỉ mặc định</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary">Thêm</button>
                    </div>
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                </form>
            </div>
        </div>
    </div>

    <th:block th:replace="~{layout::footer}"></th:block>

    <script th:inline="javascript">
        const initialOpenModal = /*[[${openModal}]]*/ null;

        async function loadDistrictAdd(selectedDistrict = null, selectedWard = null) {
            const provinceCode = document.getElementById('newProvinceOrCity')?.value;
            await window.locationUtils.loadDistricts('newDistrict', provinceCode, selectedDistrict);
            await window.locationUtils.loadWards('newWard', document.getElementById('newDistrict')?.value, selectedWard);
        }

        async function loadWardAdd(selectedWard = null) {
            const districtCode = document.getElementById('newDistrict')?.value;
            await window.locationUtils.loadWards('newWard', districtCode, selectedWard);
        }

        document.addEventListener('DOMContentLoaded', async function () {
            const addProvince = document.getElementById('newProvinceOrCity');
            const addDistrict = document.getElementById('newDistrict');
            const addWard = document.getElementById('newWard');

            const addressLines = document.querySelectorAll('.address-display');
            for (const el of addressLines) {
                await window.locationUtils.resolveAddressDisplayLine(el);
            }

            if (addProvince) {
                await window.locationUtils.loadProvinces('newProvinceOrCity', addProvince.value || null);
                if (addProvince.value) {
                    await window.locationUtils.loadDistricts('newDistrict', addProvince.value, addDistrict?.value || null);
                    if (addDistrict?.value) {
                        await window.locationUtils.loadWards('newWard', addDistrict.value, addWard?.value || null);
                    }
                }
            }

            if (initialOpenModal) {
                const modalElement = document.getElementById(initialOpenModal);
                if (modalElement) {
                    new bootstrap.Modal(modalElement).show();
                }
            }
        });
    </script>
</body>

</html>
