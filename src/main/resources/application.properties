spring.application.name=book-selling

# MySQL datasource - Uses Azure environment variables if present, otherwise defaults to local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bookdb?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mail settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=huuthinh123v@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD:xtsu pmgx kpww qfpg}
spring.mail.from=Book Store <apathyisacurse@gmail.com>
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
spring.servlet.multipart.resolve-lazily=true

# Upload storage root directory (set APP_UPLOAD_DIR=/tmp/uploads on Azure)
app.upload.dir=${APP_UPLOAD_DIR:uploads}

server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=none

# Tomcat & Proxy Settings (Critical for Azure HTTPS)
server.tomcat.max-swallow-size=15MB
server.tomcat.max-http-form-post-size=15MB
server.tomcat.max-part-count=500
server.tomcat.remote-ip-header=x-forwarded-for
server.forward-headers-strategy=native

# Debugging Login
logging.level.org.springframework.security=DEBUG
server.error.include-message=always
server.error.include-stacktrace=always
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.thymeleaf=DEBUG